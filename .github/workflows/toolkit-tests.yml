name: Toolkit Tests

on:
  push:
    branches: [main]
    paths:
      - "projects/wisdom-it-readiness-toolkit/**"
      - ".github/workflows/toolkit-tests.yml"
  pull_request:
    paths:
      - "projects/wisdom-it-readiness-toolkit/**"
      - ".github/workflows/toolkit-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run unit tests
        working-directory: projects/wisdom-it-readiness-toolkit
        run: python -m unittest discover -s tests -v
      - name: Score synthetic example
        working-directory: projects/wisdom-it-readiness-toolkit
        run: python src/scorer.py assessments/quick-check-v0.1.json examples/sample-responses.json
