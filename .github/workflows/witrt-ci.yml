name: Wisdom IT Readiness Toolkit CI

on:
  push:
    branches: [main]
    paths:
      - "projects/wisdom-it-readiness-toolkit/**"
      - ".github/workflows/witrt-ci.yml"
  pull_request:
    paths:
      - "projects/wisdom-it-readiness-toolkit/**"
      - ".github/workflows/witrt-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/wisdom-it-readiness-toolkit
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Score synthetic assessment
        run: |
          python src/cli.py score \
            assessments/quick-check-v0.1.json \
            examples/synthetic-responses.json

      - name: Generate synthetic report
        run: |
          python src/cli.py report \
            assessments/quick-check-v0.1.json \
            examples/synthetic-responses.json \
            --subject "Synthetic Demonstration" \
            --data-note "Synthetic demonstration only" \
            --output build/example-report.md
          test -s build/example-report.md

      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: witrt-example-report
          path: projects/wisdom-it-readiness-toolkit/build/example-report.md
