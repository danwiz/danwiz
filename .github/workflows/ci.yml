name: Profile Repository CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f CHANGELOG.md
          test -f docs/index.html
          test -f docs/styles.css

      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: docs/

      - name: Validate CSS structure
        run: |
          test -s docs/styles.css
          grep -q ':root' docs/styles.css
          grep -q '@media' docs/styles.css

      - name: Verify Pages links and release references
        run: |
          grep -q 'wisdom-it-readiness-toolkit' docs/index.html
          grep -q 'releases/tag/v0.1.0' docs/index.html
          grep -q 'mailto:danewisdom@gmail.com' docs/index.html
